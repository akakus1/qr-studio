<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Password Required — QR Studio</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{--bg:#080B14;--s2:#161F30;--border:rgba(255,255,255,0.07);--purple:#7C3AED;--purpleL:#A78BFA;--purpleD:#5B21B6;--pdim:rgba(124,58,237,0.15);--bp:rgba(124,58,237,0.5);--white:#F9FAFB;--t2:#CBD5E1;--tmuted:#64748B;--r16:16px;--r12:12px;--rfull:9999px;}
body{background:var(--bg);color:var(--white);font-family:'DM Sans',sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;}
.bg-mesh{position:fixed;inset:0;z-index:0;pointer-events:none;}
.bg-mesh::before{content:'';position:absolute;width:600px;height:400px;background:radial-gradient(ellipse,rgba(124,58,237,0.2),transparent 60%);top:0;left:50%;transform:translateX(-50%);}
.card{background:linear-gradient(145deg,rgba(17,24,39,0.98),rgba(13,19,35,0.99));border:1px solid rgba(255,255,255,0.08);border-radius:24px;padding:48px 40px;width:100%;max-width:420px;position:relative;z-index:1;text-align:center;}
.card::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(124,58,237,0.5),transparent);border-radius:24px 24px 0 0;}
.lock-icon{width:64px;height:64px;background:var(--pdim);border:1px solid var(--bp);border-radius:20px;display:flex;align-items:center;justify-content:center;font-size:1.8rem;margin:0 auto 24px;}
h1{font-family:'Syne',sans-serif;font-size:1.5rem;font-weight:800;letter-spacing:-.03em;margin-bottom:8px;}
p{font-size:.9rem;color:var(--tmuted);margin-bottom:32px;line-height:1.6;}
.input-wrap{position:relative;margin-bottom:16px;}
input[type="password"]{width:100%;background:rgba(22,31,48,0.8);border:1px solid rgba(255,255,255,0.1);border-radius:var(--r12);color:var(--white);font-family:'DM Sans',sans-serif;font-size:1rem;padding:14px 18px;outline:none;transition:border-color .2s;}
input[type="password"]:focus{border-color:var(--purple);}
.btn{width:100%;background:linear-gradient(135deg,var(--purple),var(--purpleD));border:none;border-radius:var(--r12);color:#fff;font-family:'DM Sans',sans-serif;font-size:1rem;font-weight:700;padding:14px;cursor:pointer;transition:opacity .2s;margin-top:8px;}
.btn:hover{opacity:.9;}
.error{background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.3);border-radius:var(--r12);color:#FCA5A5;padding:12px 16px;font-size:.85rem;margin-bottom:16px;display:none;}
.error.show{display:block;}
.logo{display:flex;align-items:center;justify-content:center;gap:8px;margin-bottom:32px;text-decoration:none;}
.logo-icon{width:28px;height:28px;background:linear-gradient(135deg,var(--purple),var(--purpleD));border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:.9rem;}
.logo-text{font-family:'Syne',sans-serif;font-size:1rem;font-weight:800;color:var(--white);}
</style>
</head>
<body>
<div class="bg-mesh"></div>
<div class="card">
  <a href="/" class="logo">
    <div class="logo-icon">⚡</div>
    <span class="logo-text">QR Studio</span>
  </a>
  <div class="lock-icon">🔒</div>
  <h1>Password Required</h1>
  <p>This QR code is protected. Enter the password to continue.</p>
  <div class="error" id="error-msg">Incorrect password. Please try again.</div>
  <form id="pwd-form">
    <div class="input-wrap">
      <input type="password" id="pwd-input" placeholder="Enter password" autocomplete="current-password" required/>
    </div>
    <button type="submit" class="btn">Unlock →</button>
  </form>
</div>
<script>
const params = new URLSearchParams(window.location.search);
const code = params.get('code');
const hasError = params.get('error');

if (hasError) {
  document.getElementById('error-msg').classList.add('show');
}

document.getElementById('pwd-form').addEventListener('submit', function(e) {
  e.preventDefault();
  const pwd = document.getElementById('pwd-input').value;
  if (code && pwd) {
    window.location.href = `/api/r/${code}?pwd=${encodeURIComponent(pwd)}`;
  }
});
</script>
</body>
</html>
